name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good ccache
        pip install --upgrade pip
        pip install --upgrade buildozer cython virtualenv sh

    - name: Build with Buildozer
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}
        ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_LATEST_HOME }}
      run: |
        # अगर पहले से कोई spec फाइल है तो उसे हटाकर फ्रेश शुरुआत करेंगे
        rm -f buildozer.spec
        buildozer init
        
        # ऑटोमैटिकली स्पेसिफिकेशन फाइल में एंड्रॉइड सेटिंग्स को गिटहब के अनुसार सेट करना
        sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
        
        # अब बिना किसी प्रॉम्ट के सीधे साइलेंट मोड में बिल्ड करना
        buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: bin/*.apk
